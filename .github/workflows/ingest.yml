name: 📥 Ingest

on:
  schedule:
    - cron: "0 1 * * MON"  # every Monday at 1am UTC
  workflow_dispatch:         # manual trigger

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check etoro/ lambda_handler.py --select E,F --ignore E501

  test:
    name: 🧪 Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  ingest-portfolio:
    name: 📊 Ingest Portfolio
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and save portfolio + instruments
        env:
          ETORO_PUBLIC_KEY: ${{ secrets.ETORO_PUBLIC_KEY }}
          ETORO_PRIVATE_KEY: ${{ secrets.ETORO_PRIVATE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
        run: PYTHONPATH=. python scripts/ingest_portfolio.py

  ingest-trades:
    name: 📈 Ingest Trades
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and save trade history
        env:
          ETORO_PUBLIC_KEY: ${{ secrets.ETORO_PUBLIC_KEY }}
          ETORO_PRIVATE_KEY: ${{ secrets.ETORO_PRIVATE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
        run: PYTHONPATH=. python scripts/ingest_trades.py

  done:
    name: ✅ Done
    needs: [ingest-portfolio, ingest-trades]
    runs-on: ubuntu-latest
    steps:
      - name: Verify data landed in S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
        run: |
          echo "=== S3 bucket contents ==="
          aws s3 ls s3://etoro-pipeline-john/ --recursive --human-readable \
            | sort | tail -20
          echo "=== Ingest complete ==="
