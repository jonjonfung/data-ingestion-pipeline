name: 📥 Ingest

on:
  schedule:
    - cron: "0 1 * * MON"  # every Monday at 1am UTC
  workflow_dispatch:         # manual trigger

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check etoro/ lambda_handler.py --select E,F --ignore E501

  test:
    name: 🧪 Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  ingest-portfolio:
    name: 📊 Ingest Portfolio
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and save portfolio + instruments
        env:
          ETORO_PUBLIC_KEY: ${{ secrets.ETORO_PUBLIC_KEY }}
          ETORO_PRIVATE_KEY: ${{ secrets.ETORO_PRIVATE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
        run: python -c "
from dotenv import load_dotenv; load_dotenv()
from etoro.data_sources import fetch_portfolio
from etoro.data_loader import save_portfolio
from etoro.instruments import fetch_instruments, save_instruments

data = fetch_portfolio('real')
save_portfolio(data)
print(f'Positions: {len(data[\"positions\"])} | Invested: \${data[\"total_invested\"]:,.2f} | P&L: \${data[\"total_unrealized_pnl\"]:,.2f}')

ids = list({p[\"instrument_id\"] for p in data[\"positions\"] if p.get(\"instrument_id\")})
if ids:
    instruments = fetch_instruments(ids)
    save_instruments(instruments)
    print(f'Instruments saved: {len(instruments)}')
"

  ingest-trades:
    name: 📈 Ingest Trades
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and save trade history
        env:
          ETORO_PUBLIC_KEY: ${{ secrets.ETORO_PUBLIC_KEY }}
          ETORO_PRIVATE_KEY: ${{ secrets.ETORO_PRIVATE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
        run: python -c "
from dotenv import load_dotenv; load_dotenv()
from etoro.trades import fetch_trades, save_trades

trades = fetch_trades(min_date='2020-01-01')
save_trades(trades)
print(f'Trades saved: {len(trades)}')
"

  done:
    name: ✅ Done
    needs: [ingest-portfolio, ingest-trades]
    runs-on: ubuntu-latest
    steps:
      - name: Verify data landed in S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
        run: |
          echo "=== S3 bucket contents ==="
          aws s3 ls s3://etoro-pipeline-john/ --recursive --human-readable \
            | sort | tail -20
          echo "=== Ingest complete ==="
